<div class="card border-0 shadow-sm"
     id="question-card"
     data-on-interval__5s__once="@get('{% url "examples:quiz-question" %}');">
  <div class="card-body text-center py-5">
    {% if is_correct %}
      <div class="mb-4">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
      </div>
      <h3 class="text-success mb-3">Correct!</h3>
      <p class="text-muted mb-0">Great job!</p>
    {% else %}
      <div class="mb-4">
        <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
      </div>
      <h3 class="text-danger mb-3">Incorrect</h3>
      <p class="text-muted mb-2">The correct answer was:</p>
      <p class="fw-bold mb-0">{{ correct_answer.text }}</p>
    {% endif %}
  </div>
</div>
